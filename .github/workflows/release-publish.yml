name: Release and Publish

on:
  push:
    tags:
      - 'helpers-v*'
      - 'automation-v*'

permissions:
  contents: write
  id-token: write

jobs:
  verify-helpers:
    if: startsWith(github.ref_name, 'helpers-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check && cd packages/helpers && bun run build

  verify-automation:
    if: startsWith(github.ref_name, 'automation-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check && cd packages/repo-automation && bun run build

  create-release-helpers:
    if: startsWith(github.ref_name, 'helpers-v')
    needs: verify-helpers
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: helpers ${{ github.ref_name }}

  create-release-automation:
    if: startsWith(github.ref_name, 'automation-v')
    needs: verify-automation
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: automation ${{ github.ref_name }}

  publish-helpers:
    if: startsWith(github.ref_name, 'helpers-v')
    needs: verify-helpers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish helpers package
        run: npm publish -w @lemons_dev/lemons-obsidian-plugin-helpers

  publish-automation:
    if: startsWith(github.ref_name, 'automation-v')
    needs: verify-automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish automation package
        run: npm publish -w @lemons_dev/lemons-obsidian-plugin-automation
